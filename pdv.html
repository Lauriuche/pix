<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminal PDV • Ultra Minimal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');
        
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            height: 100dvh;
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .terminal-container {
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @media (min-width: 768px) {
            .terminal-container {
                max-width: 600px;
                height: 85vh;
                max-height: 700px;
                border-radius: 40px;
                border: 0px solid #1f1f1f;
                box-shadow: 0 0 100px rgba(255, 255, 255, 0.00);
            }
        }

        .keypad-btn {
            background: transparent;
            border-radius: 999px;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 400;
            color: #ffffff;
            cursor: pointer;
        }

        .keypad-btn:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.9);
        }

        .btn-enter {
            background: #ffffff;
            color: #000000;
            font-weight: 700;
        }
        .btn-enter:active {
            background: #e0e0e0;
            transform: scale(0.9);
        }

        .qr-wrapper { 
            background: #ffffff; 
            padding: 16px; 
            border-radius: 24px;
        }

        .view-transition { animation: fadeInScale 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.97) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .minimal-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            padding: 12px 0;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .minimal-input:focus { border-bottom-color: #fff; }
        select.minimal-input option { background: #000; color: #fff; }

        #message-box {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            pointer-events: none;
        }
        #message-box.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .custom-scroll::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="md:p-6">

<div class="terminal-container">
    
    <!-- Toast Message Elegante -->
    <div id="message-box" class="bg-zinc-900 border border-zinc-800 text-white px-5 py-3 rounded-full text-xs font-medium flex items-center gap-3 shadow-2xl">
        <div id="msg-dot" class="w-1.5 h-1.5 bg-white rounded-full"></div>
        <span id="message-text" class="tracking-wide">Processando</span>
    </div>

    <!-- Status Bar Invisível -->
    <div class="px-8 pt-8 flex justify-between items-center z-10">
        <div class="flex items-center gap-2 opacity-50">
            <div id="status-dot" class="w-1 h-1 bg-zinc-500 rounded-full transition-colors duration-500"></div>
            <span id="terminal-name-label" class="text-[9px] font-bold tracking-[0.2em] uppercase">OFFLINE</span>
        </div>
        <!-- Relógio / Botão Secreto Opcional -->
        <button onclick="toggleSettings()" class="text-[10px] font-medium text-zinc-500 hover:text-white tracking-widest opacity-50 transition-opacity">
            <span id="clock">00:00</span>
        </button>
    </div>

    <!-- MAIN AREA -->
    <!-- ADICIONADO 'overflow-hidden' para evitar que as views subam para o topo -->
    <div class="flex-1 relative flex flex-col min-h-0 overflow-hidden">
        
        <!-- ECRÃ DE VALOR (DIGITAÇÃO) -->
        <div id="view-main" class="flex-1 flex flex-col p-6 view-transition">
            
            <div class="flex-1 flex flex-col items-center justify-center mb-4">
                <span id="instruction-label" class="text-[13px] text-zinc-500 tracking-[0.5em] uppercase mb-6 opacity-60">Valor</span>
                <div class="flex items-baseline justify-center w-full overflow-hidden px-4">
                    <span class="text-2x1 font-light text-zinc-600 mr-1">R$</span>
                    <span id="display-value" class="text-[8rem] md:text-[8rem] font-bold tracking-normal leading-none">0,00</span>
                </div>
            </div>

            <!-- Teclado Ultra Clean -->
            <div id="virtual-keypad" class="grid grid-cols-3 gap-y-2 gap-x-4 pb-4">
                <button onclick="pressKey('1')" class="keypad-btn h-16 md:h-20">1</button>
                <button onclick="pressKey('2')" class="keypad-btn h-16 md:h-20">2</button>
                <button onclick="pressKey('3')" class="keypad-btn h-16 md:h-20">3</button>
                <button onclick="pressKey('4')" class="keypad-btn h-16 md:h-20">4</button>
                <button onclick="pressKey('5')" class="keypad-btn h-16 md:h-20">5</button>
                <button onclick="pressKey('6')" class="keypad-btn h-16 md:h-20">6</button>
                <button onclick="pressKey('7')" class="keypad-btn h-16 md:h-20">7</button>
                <button onclick="pressKey('8')" class="keypad-btn h-16 md:h-20">8</button>
                <button onclick="pressKey('9')" class="keypad-btn h-16 md:h-20">9</button>
                
                <button onclick="pressKey('back')" class="keypad-btn h-16 md:h-20 text-zinc-500">
                    <i data-lucide="delete" stroke-width="1.5" size="24"></i>
                </button>
                <button onclick="pressKey('0')" class="keypad-btn h-16 md:h-20">0</button>
                
                <!-- Botão de Ação -->
                <button onclick="pressKey('enter')" class="keypad-btn btn-enter h-16 md:h-20 shadow-[0_0_40px_rgba(255,255,255,0.1)]">
                    <i data-lucide="arrow-right" stroke-width="2.5" size="28"></i>
                </button>
            </div>
        </div>

        <!-- ECRÃ PIX -->
        <!-- Ajustado para scroll-y em telas muito pequenas -->
        <div id="view-pix" class="hidden absolute inset-0 bg-black overflow-y-auto custom-scroll z-10">
            <div class="min-h-full flex flex-col items-center justify-center p-6 text-center">
                <div class="qr-wrapper mb-4">
                    <div id="pix-qr-box" class="mx-auto"></div>
                </div>
                
                <!-- ID da Transação para a API -->
                <p id="tx-id-display" class="text-zinc-600 font-mono text-[9px] mb-6 tracking-widest"></p>

                <div class="mb-6">
                    <p class="text-zinc-500 text-[10px] uppercase tracking-[0.2em] mb-1 opacity-60">Total a Pagar</p>
                    <span class="text-4xl md:text-5xl font-bold text-white tracking-tighter" id="pix-amount-label">R$ 0,00</span>
                </div>
                
                <!-- Indicador Dinâmico de Escuta Automática -->
                <div id="pix-status-indicator" class="flex items-center gap-3 bg-emerald-500/10 px-5 py-2.5 rounded-full border border-emerald-500/20 mb-6 transition-all">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                    <span class="text-emerald-500 text-[9px] font-bold tracking-widest uppercase">A aguardar API de Pagamento...</span>
                </div>

                <button onclick="resetApp()" class="px-6 py-3 rounded-full border border-zinc-800 text-zinc-400 text-[9px] font-bold uppercase tracking-[0.2em] hover:bg-white hover:text-black hover:border-white transition-all active:scale-95">
                    Cancelar / Voltar
                </button>
            </div>
        </div>

        <!-- ECRÃ WIFI -->
        <div id="view-wifi" class="hidden absolute inset-0 bg-black overflow-y-auto custom-scroll z-10">
            <div class="min-h-full flex flex-col items-center justify-center p-6 text-center">
                <h2 class="text-2xl font-bold mb-1 tracking-tight">Wi-Fi</h2>
                <p class="text-zinc-500 text-[10px] mb-6 uppercase tracking-[0.2em] opacity-60">Conexão Automática</p>
                
                <div class="qr-wrapper mb-6"><div id="wifi-qr-box" class="mx-auto"></div></div>
                
                <div class="w-full max-w-[280px] space-y-4 mb-8">
                    <div>
                        <p class="text-[9px] text-zinc-600 uppercase tracking-widest mb-1">Rede</p>
                        <p id="wifi-ssid-val" class="text-base font-medium text-white">--</p>
                    </div>
                    <div>
                        <p class="text-[9px] text-zinc-600 uppercase tracking-widest mb-1">Senha</p>
                        <p id="wifi-pass-val" class="text-base font-mono text-white">--</p>
                    </div>
                </div>
                <button onclick="resetApp()" class="px-8 py-4 rounded-full bg-white text-black text-[10px] font-bold uppercase tracking-[0.2em] active:scale-95 transition-all">
                    Voltar
                </button>
            </div>
        </div>

        <!-- ECRÃ WHATSAPP -->
        <div id="view-support" class="hidden absolute inset-0 bg-black overflow-y-auto custom-scroll z-10">
            <div class="min-h-full flex flex-col items-center justify-center p-6 text-center">
                <h2 class="text-2xl font-bold mb-1 tracking-tight">Suporte</h2>
                <p class="text-zinc-500 text-[10px] mb-6 uppercase tracking-[0.2em] opacity-60">Atendimento Direto</p>
                
                <div id="whatsapp-qr" class="qr-wrapper mb-6 mx-auto"></div>
                
                <p class="text-zinc-500 text-[11px] text-center leading-relaxed max-w-[250px] mb-8">
                    Aponte a câmera para iniciar uma conversa no WhatsApp.
                </p>
                <button onclick="resetApp()" class="px-8 py-4 rounded-full border border-zinc-800 text-white text-[10px] font-bold uppercase tracking-[0.2em] active:scale-95 transition-all">
                    Fechar
                </button>
            </div>
        </div>

        <!-- ECRÃ HISTÓRICO DE VENDAS -->
        <div id="view-sales" class="hidden absolute inset-0 bg-black flex flex-col p-8 view-transition z-20">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-light tracking-tighter">Vendas</h2>
                <button onclick="resetApp()" class="w-10 h-10 flex items-center justify-end text-white">
                    <i data-lucide="x" stroke-width="1.5"></i>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto pr-2 custom-scroll space-y-3" id="sales-list">
                <!-- Lista de Vendas Gerada Dinamicamente -->
            </div>

            <div class="pt-6 mt-4 border-t border-zinc-900 flex justify-between items-end">
                <p class="text-zinc-500 text-[10px] uppercase tracking-widest mb-1">Total Recebido</p>
                <p id="sales-total" class="text-2xl font-bold text-white">R$ 0,00</p>
            </div>
        </div>

        <!-- ECRÃ CONFIGURAÇÕES (ADMIN) -->
        <div id="view-settings" class="hidden absolute inset-0 bg-black flex flex-col p-8 view-transition z-20">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-light tracking-tighter">Ajustes</h2>
                <button onclick="toggleSettings()" class="w-10 h-10 flex items-center justify-end text-white">
                    <i data-lucide="x" stroke-width="1.5"></i>
                </button>
            </div>

            <div class="space-y-8 flex-1 overflow-y-auto pr-2 custom-scroll">
                <div>
                    <label class="block text-[9px] text-zinc-500 uppercase tracking-widest mb-1">Nome do Terminal</label>
                    <input type="text" id="input-terminal-name" class="minimal-input" placeholder="Ex: CAIXA PRINCIPAL">
                </div>
                
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[9px] text-zinc-500 uppercase tracking-widest mb-1">Entrada</label>
                        <select id="input-kb-type" class="minimal-input cursor-pointer">
                            <option value="virtual">Teclado Touch</option>
                            <option value="fisico">Físico Externo</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[9px] text-zinc-500 uppercase tracking-widest mb-1">Conexão</label>
                        <select id="input-conn-type" class="minimal-input cursor-pointer">
                            <option value="cabo">Cabo / USB</option>
                            <option value="bluetooth">Bluetooth</option>
                        </select>
                    </div>
                </div>

                <div class="pt-4 space-y-6">
                    <div>
                        <label class="block text-[9px] text-zinc-500 uppercase tracking-widest mb-1">API Key (Mercado Pago/Gateway)</label>
                        <input type="password" id="input-api-key" class="minimal-input" placeholder="Insira o Access Token / API Key">
                    </div>
                    <div>
                        <label class="block text-[9px] text-zinc-500 uppercase tracking-widest mb-1">Recebedor Pix (Chave)</label>
                        <input type="text" id="input-pix-key" class="minimal-input" placeholder="CPF, Celular ou Email">
                    </div>
                </div>

                <div class="pt-4 space-y-6">
                    <div>
                        <label class="block text-[9px] text-zinc-500 uppercase tracking-widest mb-1">Wi-Fi (Rede)</label>
                        <input type="text" id="input-wifi-ssid" class="minimal-input" placeholder="SSID da Rede">
                    </div>
                    <div>
                        <label class="block text-[9px] text-zinc-500 uppercase tracking-widest mb-1">Wi-Fi (Senha)</label>
                        <input type="text" id="input-wifi-pass" class="minimal-input" placeholder="Senha da Rede">
                    </div>
                </div>

                <div class="pt-4 pb-8">
                    <label class="block text-[9px] text-zinc-500 uppercase tracking-widest mb-1">WhatsApp Contato</label>
                    <input type="text" id="input-whatsapp" class="minimal-input" placeholder="Ex: 5511999999999">
                </div>
            </div>

            <button onclick="saveSettings()" id="btn-save" class="mt-4 w-full py-5 rounded-full bg-white text-black font-bold uppercase tracking-[0.2em] text-[10px] active:scale-[0.98] transition-all">
                Salvar Definições
            </button>
        </div>

    </div>
</div>

<script type="module">
    // IMPORTANTE: Módulo do Realtime Database restaurado
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

    // Suas credenciais do Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyD3E7c_4jbnLJCGCapM5L8rta6AXVHvZgs",
      authDomain: "indisponivel-rrehfe.firebaseapp.com",
      databaseURL: "https://indisponivel-rrehfe.firebaseio.com",
      projectId: "indisponivel-rrehfe",
      storageBucket: "indisponivel-rrehfe.firebasestorage.app",
      messagingSenderId: "880210924564",
      appId: "1:880210924564:web:fd565cdb0e4f04cd7ac301"
    };

    // SOLUÇÃO: ID Fixo para evitar que a DB crie novos nós a cada refresh da página.
    const safeAppId = 'terminal_pdv_principal';
    
    let db, auth;
    let currentDigits = "";
    let salesData = [];
    let pendingSaleAmount = 0; 
    let unsubscribePayment = null; // Função para parar de escutar a transação atual
    let mpPollInterval = null; // Timer para a API do Mercado Pago
    
    // Configuração Padrão Inicial
    let terminalConfig = {
        terminalName: "CAIXA",
        wifiSSID: "WIFI_LOJA",
        wifiPass: "senha123",
        pixKey: "pix@empresa.com.br",
        mpApiKey: "",
        kbType: "virtual",
        connType: "cabo",
        whatsapp: "351999999999"
    };

    // Inicialização Firebase (Realtime Database)
    const initFirebase = async () => {
        if (!firebaseConfig.apiKey) {
            updateUIFromConfig();
            return;
        }

        const app = initializeApp(firebaseConfig);
        db = getDatabase(app); // Usando Realtime Database
        auth = getAuth(app);

        try {
            await signInAnonymously(auth);
        } catch (err) { 
            console.error("Erro no Auth:", err);
            showMessage("Erro de Autenticação", false); 
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Sincronização Automática em Tempo Real das Configurações
                const configRef = ref(db, `artifacts/${safeAppId}/public/data/terminal_settings/main`);
                onValue(configRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        terminalConfig = { ...terminalConfig, ...data };
                        updateUIFromConfig();
                    } else { 
                        saveSettings(true); 
                    }
                }, (error) => console.error("Erro Config DB:", error));

                // Sincronização Automática em Tempo Real do Histórico de Vendas
                const salesRef = ref(db, `artifacts/${safeAppId}/public/data/sales`);
                onValue(salesRef, (snapshot) => {
                    salesData = [];
                    
                    // Define a data limite de 1 mês atrás
                    const oneMonthAgo = new Date();
                    oneMonthAgo.setMonth(oneMonthAgo.getMonth() - 1);

                    snapshot.forEach(childSnapshot => {
                        const data = childSnapshot.val();
                        const saleDate = new Date(data.timestamp);

                        // Limpeza Automática: Se a venda tiver mais de 1 mês, apaga-a da Base de Dados
                        if (saleDate < oneMonthAgo) {
                            remove(childSnapshot.ref).catch(e => console.error("Erro na limpeza de dados:", e));
                        } else {
                            // Caso contrário, adiciona à lista para exibir
                            salesData.push({ id: childSnapshot.key, ...data });
                        }
                    });
                    // Ordena localmente do mais recente para o mais antigo
                    salesData.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    renderSales();
                }, (error) => console.error("Erro Vendas DB:", error));
                
                document.getElementById('status-dot').className = "w-1 h-1 bg-white rounded-full";
                document.getElementById('terminal-name-label').classList.replace('text-zinc-500', 'text-white');
            }
        });
    };

    // Lógica de Atualização da UI baseada puramente nos dados da Base de Dados
    function updateUIFromConfig() {
        document.getElementById('terminal-name-label').textContent = terminalConfig.terminalName || "OFFLINE";
        
        document.getElementById('input-terminal-name').value = terminalConfig.terminalName || "";
        document.getElementById('input-api-key').value = terminalConfig.mpApiKey || "";
        document.getElementById('input-wifi-ssid').value = terminalConfig.wifiSSID || "";
        document.getElementById('input-wifi-pass').value = terminalConfig.wifiPass || "";
        document.getElementById('input-pix-key').value = terminalConfig.pixKey || "";
        document.getElementById('input-kb-type').value = terminalConfig.kbType || "virtual";
        document.getElementById('input-conn-type').value = terminalConfig.connType || "cabo";
        document.getElementById('input-whatsapp').value = terminalConfig.whatsapp || "";

        const keypad = document.getElementById('virtual-keypad');
        if (terminalConfig.kbType === 'fisico') {
            keypad.style.display = 'none';
        } else {
            keypad.style.display = 'grid';
        }
    }

    // Lógica do Teclado
    window.pressKey = (key) => {
        if (key === 'back') {
            currentDigits = currentDigits.slice(0, -1);
        } else if (key === 'enter') {
            handleAction();
            return;
        } else {
            if (key === '0' && currentDigits === "") return;
            if (currentDigits.length < 8) currentDigits += key;
        }
        updateDisplay();
    };

    function updateDisplay() {
        const val = currentDigits === "" ? 0 : parseInt(currentDigits);
        document.getElementById('display-value').textContent = (val / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        
        // Efeito visual subtil ao digitar (Dica sobre funções secretas)
        const label = document.getElementById('instruction-label');
        if(currentDigits.length > 2 && currentDigits.endsWith('01')) { label.textContent = "ABRIR WI-FI"; label.style.color = "#fff"; }
        else if(currentDigits.length > 2 && currentDigits.endsWith('02')) { label.textContent = "ABRIR SUPORTE"; label.style.color = "#fff"; }
        else if(currentDigits.length > 2 && currentDigits.endsWith('03')) { label.textContent = "DEFINIÇÕES"; label.style.color = "#fff"; }
        else if(currentDigits.length > 2 && currentDigits.endsWith('04')) { label.textContent = "HISTÓRICO VENDAS"; label.style.color = "#fff"; }
        else { label.textContent = "VALOR"; label.style.color = ""; }
    }

    function handleAction() {
        if (!currentDigits || currentDigits === "0") return;
        const val = parseInt(currentDigits);
        const cents = val % 100;
        const amountFloat = val / 100;

        // --- AS FUNÇÕES ESPECIAIS SECRETAS ---
        if (cents === 1 && val > 0) {
            showWifi();
        } else if (cents === 2 && val > 0) {
            showSupport();
        } else if (cents === 3 && val > 0) {
            toggleSettings();
            currentDigits = "";
            updateDisplay();
        } else if (cents === 4 && val > 0) {
            showSalesHistory();
        } else {
            processSale(amountFloat);
        }
    }

    async function processSale(amount) {
        pendingSaleAmount = amount;
        const txId = "TX_" + Date.now(); 
        
        // INTEGRAÇÃO REAL COM MERCADO PAGO (Se houver API Key)
        if (terminalConfig.mpApiKey && terminalConfig.mpApiKey.trim() !== "") {
            document.getElementById('view-pix').classList.remove('hidden');
            document.getElementById('pix-amount-label').textContent = amount.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            
            const indicator = document.getElementById('pix-status-indicator');
            if (indicator) {
                indicator.className = "flex items-center gap-3 bg-yellow-500/10 px-5 py-2.5 rounded-full border border-yellow-500/20 mb-6 transition-all";
                indicator.innerHTML = `<div class="w-2 h-2 bg-yellow-500 rounded-full animate-pulse"></div><span class="text-yellow-500 text-[9px] font-bold tracking-widest uppercase">A Gerar PIX Dinâmico...</span>`;
            }

            try {
                const response = await fetch("https://api.mercadopago.com/v1/payments", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${terminalConfig.mpApiKey}`,
                        "X-Idempotency-Key": txId
                    },
                    body: JSON.stringify({
                        transaction_amount: amount,
                        description: "Venda PDV " + terminalConfig.terminalName,
                        payment_method_id: "pix",
                        payer: { email: "pdv@cliente.com" }
                    })
                });

                const data = await response.json();

                if (data.id && data.point_of_interaction) {
                    const qrCode = data.point_of_interaction.transaction_data.qr_code;
                    showPixUI(amount, data.id, qrCode, true);
                    pollMercadoPago(data.id, amount);
                } else {
                    throw new Error("Erro na API do Mercado Pago");
                }
            } catch (err) {
                console.error("Erro MP:", err);
                fallbackStaticPix(amount, txId);
            }
        } else {
            // PIX ESTÁTICO (Sem API Key)
            fallbackStaticPix(amount, txId);
        }
    }

    function fallbackStaticPix(amount, txId) {
        const payload = `00020101021126580014BR.GOV.BCB.PIX0136${terminalConfig.pixKey}520400005303986540${amount.toFixed(2)}5802BR5913Terminal PDV6008SAO PAULO62070503***6304`;
        showPixUI(amount, txId, payload, false);

        // Fica à escuta do Firebase por alterações (caso utilize um Webhook no Backend)
        if (db && auth && auth.currentUser) {
            if (unsubscribePayment) unsubscribePayment();
            
            const txRef = ref(db, `artifacts/${safeAppId}/public/data/transactions/${txId}`);
            set(txRef, { status: 'pendente', amount: amount, timestamp: new Date().toISOString() });

            unsubscribePayment = onValue(txRef, (snapshot) => {
                const data = snapshot.val();
                if (data && (data.status === 'pago' || data.status === 'approved')) {
                    handleAutomaticPayment(amount);
                    if (unsubscribePayment) unsubscribePayment();
                }
            });
        }
    }

    function pollMercadoPago(paymentId, amount) {
        if (mpPollInterval) clearInterval(mpPollInterval);
        
        // Verifica o status do pagamento a cada 5 segundos
        mpPollInterval = setInterval(async () => {
            try {
                const res = await fetch(`https://api.mercadopago.com/v1/payments/${paymentId}`, {
                    headers: { "Authorization": `Bearer ${terminalConfig.mpApiKey}` }
                });
                const data = await res.json();
                
                if (data.status === "approved") {
                    clearInterval(mpPollInterval);
                    handleAutomaticPayment(amount);
                }
            } catch (e) {
                console.error("Erro ao verificar pagamento:", e);
            }
        }, 5000);
    }

    function showPixUI(amount, txId, qrString, isDynamic) {
        document.getElementById('view-pix').classList.remove('hidden');
        document.getElementById('pix-amount-label').textContent = amount.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        
        const txDisplay = document.getElementById('tx-id-display');
        if (txDisplay) txDisplay.textContent = "ID: " + txId;
        
        const indicator = document.getElementById('pix-status-indicator');
        if (indicator) {
            if (isDynamic) {
                indicator.className = "flex items-center gap-3 bg-emerald-500/10 px-5 py-2.5 rounded-full border border-emerald-500/20 mb-6 transition-all";
                indicator.innerHTML = `<div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div><span class="text-emerald-500 text-[9px] font-bold tracking-widest uppercase">A aguardar PIX Automático...</span>`;
            } else {
                indicator.className = "flex items-center gap-3 bg-blue-500/10 px-5 py-2.5 rounded-full border border-blue-500/20 mb-6 transition-all";
                indicator.innerHTML = `<div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div><span class="text-blue-500 text-[9px] font-bold tracking-widest uppercase">A aguardar API de Pagamento...</span>`;
            }
        }

        const qrBox = document.getElementById('pix-qr-box');
        qrBox.innerHTML = "";
        new QRCode(qrBox, { text: qrString, width: 450, height: 450, colorDark: "#000000" });
    }

    function handleAutomaticPayment(amount) {
        // Grava no Realtime Database o Histórico de Vendas
        if (db && auth && auth.currentUser) {
            const salesRef = ref(db, `artifacts/${safeAppId}/public/data/sales`);
            push(salesRef, {
                amount: amount,
                timestamp: new Date().toISOString(),
                method: 'PIX',
                status: 'Pago'
            }).catch(e => console.error("Erro ao gravar venda:", e));
        }

        // Toca o som de Caixa Registradora
        try {
            const somCaixa = new Audio('https://www.myinstants.com/media/sounds/cash-register-kaching-sound-effect-audio-library.mp3');
            const playPromise = somCaixa.play();
            // Trata a rejeição da promessa caso o browser bloqueie o áudio para evitar o UNHANDLEDREJECTION
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.warn("Aviso: O som não pôde ser reproduzido (bloqueio do navegador ou ficheiro indisponível).", error);
                });
            }
        } catch (e) {
            console.error("Erro interno ao tentar reproduzir o som:", e);
        }
        
        // Substitui o QR Code pela mensagem de SUCESSO e o símbolo de CHECK
        const qrBox = document.getElementById('pix-qr-box');
        if (qrBox) {
            qrBox.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full w-full view-transition py-4">
                    <div class="w-24 h-24 bg-emerald-500 rounded-full flex items-center justify-center mb-5 shadow-[0_0_40px_rgba(16,185,129,0.4)]">
                        <i data-lucide="check" class="text-black" stroke-width="4" size="48"></i>
                    </div>
                    <span class="text-emerald-500 font-extrabold tracking-widest uppercase text-sm">PAGO COM SUCESSO</span>
                </div>
            `;
            lucide.createIcons();
        }

        // Esconde o indicador inferior para a interface ficar focada no Check
        const indicator = document.getElementById('pix-status-indicator');
        if (indicator) {
            indicator.classList.add('hidden');
        }
        
        showMessage("Pagamento Recebido!", true);

        // Volta ao início automaticamente após sucesso (4 segundos)
        setTimeout(() => {
            resetApp();
        }, 4000);
    }

    function showWifi() {
        document.getElementById('view-wifi').classList.remove('hidden');
        document.getElementById('wifi-ssid-val').textContent = terminalConfig.wifiSSID;
        document.getElementById('wifi-pass-val').textContent = terminalConfig.wifiPass;
        const qrBox = document.getElementById('wifi-qr-box');
        qrBox.innerHTML = "";
        const wifiString = `WIFI:T:WPA;S:${terminalConfig.wifiSSID};P:${terminalConfig.wifiPass};;`;
        new QRCode(qrBox, { text: wifiString, width: 450, height: 450, colorDark: "#000000" });
    }

    function showSupport() {
        document.getElementById('view-support').classList.remove('hidden');
        const qrBox = document.getElementById('whatsapp-qr');
        qrBox.innerHTML = "";
        const url = `https://wa.me/${terminalConfig.whatsapp}`;
        new QRCode(qrBox, { text: url, width: 450, height: 450, colorDark: "#000000" });
    }

    function showSalesHistory() {
        document.getElementById('view-sales').classList.remove('hidden');
        renderSales(); // Garante que a lista atualiza ao abrir
        currentDigits = "";
        updateDisplay();
    }

    function renderSales() {
        const container = document.getElementById('sales-list');
        const totalEl = document.getElementById('sales-total');
        if (!container) return;

        container.innerHTML = "";
        let total = 0;

        if (salesData.length === 0) {
            container.innerHTML = `<p class="text-zinc-600 text-xs text-center mt-10">Nenhuma venda registada.</p>`;
        } else {
            salesData.forEach(sale => {
                total += sale.amount;
                const dateObj = new Date(sale.timestamp);
                const formattedDate = dateObj.toLocaleDateString('pt-BR') + ' ' + dateObj.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
                
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-zinc-900/40 p-4 rounded-2xl border border-white/5">
                        <div>
                            <p class="text-[9px] text-zinc-500 uppercase tracking-widest mb-1">${formattedDate}</p>
                            <p class="text-xs font-medium text-white">${sale.method} <span class="text-zinc-600 ml-1">• ${sale.status}</span></p>
                        </div>
                        <span class="font-bold text-white">${sale.amount.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}</span>
                    </div>
                `;
            });
        }
        totalEl.textContent = total.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
    }

    window.resetApp = () => {
        // Cancela a escuta da API se o utilizador clicar em Voltar manualmente
        if (unsubscribePayment) {
            unsubscribePayment();
            unsubscribePayment = null;
        }
        if (mpPollInterval) {
            clearInterval(mpPollInterval);
            mpPollInterval = null;
        }

        const views = ['view-pix', 'view-wifi', 'view-support', 'view-settings', 'view-sales'];
        views.forEach(v => document.getElementById(v).classList.add('hidden'));
        currentDigits = "";
        pendingSaleAmount = 0;
        updateDisplay();
    };

    window.toggleSettings = () => {
        const view = document.getElementById('view-settings');
        if (view.classList.contains('hidden')) {
            // Garante que ao abrir os inputs estão de acordo com as variáveis da Base de Dados
            updateUIFromConfig();
            view.classList.remove('hidden');
        } else {
            view.classList.add('hidden');
        }
    };

    window.saveSettings = async (isInitial = false) => {
        const btn = document.getElementById('btn-save');
        btn.disabled = true;
        btn.textContent = "A AGUARDAR...";

        const newConfig = isInitial ? terminalConfig : {
            terminalName: document.getElementById('input-terminal-name').value || "PDV",
            mpApiKey: document.getElementById('input-api-key').value || "",
            wifiSSID: document.getElementById('input-wifi-ssid').value || "Rede",
            wifiPass: document.getElementById('input-wifi-pass').value || "",
            pixKey: document.getElementById('input-pix-key').value || "pix@empresa.com",
            kbType: document.getElementById('input-kb-type').value,
            connType: document.getElementById('input-conn-type').value,
            whatsapp: document.getElementById('input-whatsapp').value || "351999999999"
        };

        if (db && auth.currentUser) {
            try {
                const configRef = ref(db, `artifacts/${safeAppId}/public/data/terminal_settings/main`);
                await set(configRef, newConfig);
                if (!isInitial) showMessage("Atualizado na Nuvem", true);
            } catch (e) { 
                console.error("Erro ao gravar:", e);
                showMessage("Erro de Permissão", false); 
            }
        } else { 
            terminalConfig = newConfig; 
            updateUIFromConfig(); 
        }

        btn.disabled = false;
        btn.textContent = "Gravar Definições";
        if (!isInitial) toggleSettings();
    };

    function showMessage(text, success = true) {
        const box = document.getElementById('message-box');
        const txt = document.getElementById('message-text');
        const dot = document.getElementById('msg-dot');
        
        txt.textContent = text;
        dot.className = success ? "w-1.5 h-1.5 bg-white rounded-full" : "w-1.5 h-1.5 bg-red-500 rounded-full";
        box.classList.add('show');
        
        setTimeout(() => box.classList.remove('show'), 2500);
    }

    // Atalhos de Teclado Físico
    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
        
        const isMenuOpen = !document.getElementById('view-settings').classList.contains('hidden');
        if (isMenuOpen) {
            if (e.key === 'Escape') toggleSettings();
            return;
        }

        const isPixOpen = !document.getElementById('view-pix').classList.contains('hidden');
        const isWifiOpen = !document.getElementById('view-wifi').classList.contains('hidden');
        const isSupportOpen = !document.getElementById('view-support').classList.contains('hidden');
        const isSalesOpen = !document.getElementById('view-sales').classList.contains('hidden');

        if (e.key === 'Enter') {
            if (isPixOpen) {
                // Pagamento forçado removido. Aguarda apenas pela API.
                return;
            }
            else if (isWifiOpen || isSupportOpen || isSalesOpen) resetApp(); 
            else handleAction();
        } else if (e.key >= '0' && e.key <= '9') {
            pressKey(e.key);
        } else if (e.key === 'Backspace') {
            pressKey('back');
        } else if (e.key === 'Escape') {
            resetApp();
        }
    });

    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').textContent = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    }, 1000);

    window.addEventListener('load', () => {
        lucide.createIcons();
        initFirebase();
    });
</script>
</body>
</html>
