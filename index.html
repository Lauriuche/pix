<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminal PDV • Mercado Pago</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background-color: #0a0a0a; 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .terminal {
            background: #111111;
            border: 1px solid #222;
            box-shadow: 0 0 80px rgba(0, 255, 100, 0.15);
            max-width: 420px;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .value-box {
            background: #1a1a1a;
            border-radius: 28px;
            box-shadow: 
                0 0 40px rgba(0, 255, 100, 0.25),
                inset 0 4px 20px rgba(255,255,255,0.03);
            transition: all 0.3s ease;
        }

        .value-box:hover {
            box-shadow: 
                0 0 60px rgba(0, 255, 100, 0.4);
        }
    </style>
</head>
<body>

<div class="terminal p-8 flex flex-col h-full">

    <!-- Header -->
    <div class="flex items-center justify-between mb-12">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
            <span class="text-sm font-semibold tracking-widest text-emerald-400">Terminal Online</span>
        </div>
        <div class="text-[10px] font-black tracking-widest text-zinc-500">MERCADO PAGO</div>
    </div>

    <!-- Valor a Pagar -->
    <div class="flex-1 flex flex-col items-center justify-center">
        <p class="text-zinc-400 text-sm font-medium tracking-widest mb-6">valor a pagar</p>
        
        <div id="valueBox" class="value-box px-12 py-10 w-full max-w-[320px]">
            <div class="text-center">
                <span class="text-7xl font-extrabold text-white tracking-tighter" id="displayValue">0,00</span>
            </div>
        </div>
    </div>

    <!-- Teclado e resto (mantido igual à versão anterior) -->
    <div id="interactionArea" class="mt-auto">
        <!-- Teclado Numérico -->
        <div id="view_keypad" class="grid grid-cols-3 gap-4">
            <button onclick="handleInput('1')" class="keypad-btn h-20 rounded-3xl text-4xl font-bold bg-zinc-900 hover:bg-zinc-800">1</button>
            <button onclick="handleInput('2')" class="keypad-btn h-20 rounded-3xl text-4xl font-bold bg-zinc-900 hover:bg-zinc-800">2</button>
            <button onclick="handleInput('3')" class="keypad-btn h-20 rounded-3xl text-4xl font-bold bg-zinc-900 hover:bg-zinc-800">3</button>
            <button onclick="handleInput('4')" class="keypad-btn h-20 rounded-3xl text-4xl font-bold bg-zinc-900 hover:bg-zinc-800">4</button>
            <button onclick="handleInput('5')" class="keypad-btn h-20 rounded-3xl text-4xl font-bold bg-zinc-900 hover:bg-zinc-800">5</button>
            <button onclick="handleInput('6')" class="keypad-btn h-20 rounded-3xl text-4xl font-bold bg-zinc-900 hover:bg-zinc-800">6</button>
            <button onclick="handleInput('7')" class="keypad-btn h-20 rounded-3xl text-4xl font-bold bg-zinc-900 hover:bg-zinc-800">7</button>
            <button onclick="handleInput('8')" class="keypad-btn h-20 rounded-3xl text-4xl font-bold bg-zinc-900 hover:bg-zinc-800">8</button>
            <button onclick="handleInput('9')" class="keypad-btn h-20 rounded-3xl text-4xl font-bold bg-zinc-900 hover:bg-zinc-800">9</button>
            <button onclick="handleInput('backspace')" class="keypad-btn h-20 rounded-3xl flex items-center justify-center text-zinc-400 bg-zinc-900 hover:bg-zinc-800">
                <i data-lucide="delete" size="28"></i>
            </button>
            <button onclick="handleInput('0')" class="keypad-btn h-20 rounded-3xl text-4xl font-bold bg-zinc-900 hover:bg-zinc-800">0</button>
            <button onclick="startPayment()" class="keypad-btn h-20 rounded-3xl bg-[#009ee3] text-white flex items-center justify-center shadow-lg">
                <i data-lucide="arrow-right" size="32" stroke-width="3"></i>
            </button>
        </div>

        <!-- As outras telas (checkout, loading, expired, success) continuam iguais à versão anterior -->
        <!-- ... (mantive compacto para não ficar gigante) -->
    </div>

    <footer class="text-center text-[10px] text-zinc-600 mt-8">
        terminal PDV • Mercado Pago
    </footer>
</div>

<script>
    // === CONFIGURAÇÃO ===
    const SETTINGS = {
        TOKEN: ""APP_USR-3421363134879525-042411-0d95be3565ec7e5bfe44e731c51a1420-68553968",   // ← Coloque seu token aqui
        EXPIRE_MS: 2 * 60 * 1000
    };

    let digits = "";

    lucide.createIcons();

    function handleInput(key) {
        if (key === 'backspace') {
            digits = digits.slice(0, -1);
        } else if (digits.length < 8) {
            digits += key;
        }
        updateDisplay();
    }

    function updateDisplay() {
        const el = document.getElementById('displayValue');
        if (!digits) {
            el.textContent = "0,00";
        } else {
            const valor = (parseInt(digits) / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            el.textContent = valor;
        }
    }

    // Função startPayment(), renderQRCode, etc. permanecem iguais à versão anterior com círculo de progresso

    console.log('%cTerminal PDV com visual da foto carregado!', 'color:#00ff88; font-weight:bold');
</script>
</body>
</html>
