<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminal $lauriuche v2.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --bg: #050505;
            --card: #0f0f0f;
            --accent: #22c55e;
        }

        body { 
            background-color: var(--bg); 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            height: 100vh; 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .terminal-card {
            background: var(--card);
            border: 1px solid #1a1a1a;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.5rem;
            position: relative;
        }

        @media (min-width: 640px) {
            .terminal-card {
                width: 400px;
                height: auto;
                min-height: 720px;
                border-radius: 3.5rem;
            }
        }

        .keypad-btn {
            background: #151515;
            border: 1px solid #222;
            transition: all 0.1s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-size: 1.6rem;
            font-weight: 700;
            border-radius: 1.5rem;
            height: 4.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .keypad-btn:active {
            background: #222;
            transform: scale(0.95);
            border-color: var(--accent);
        }

        .btn-pay {
            background: var(--accent);
            color: white;
            border: none;
        }

        #qr-container {
            background: white;
            padding: 1.25rem;
            border-radius: 2rem;
            display: inline-block;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
        }

        .success-overlay {
            position: fixed;
            inset: 0;
            background: #15803d;
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #1a1a1a;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #toast-error {
            display: none;
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #ef4444;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            z-index: 200;
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
            width: 90%;
            max-width: 350px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="toast-error">Erro de Conexão</div>

    <!-- Tela de Sucesso -->
    <div id="success-screen" class="success-overlay animate-in fade-in zoom-in duration-500">
        <div class="bg-white text-green-700 rounded-full p-6 shadow-2xl mb-6">
            <i data-lucide="check" size="64" stroke-width="4"></i>
        </div>
        <h1 class="text-4xl font-black italic tracking-tighter text-white">RECEBIDO!</h1>
        <p class="text-green-100 mt-2 font-bold uppercase tracking-widest text-xs">Venda Finalizada</p>
    </div>

    <div class="terminal-card">
        
        <header class="flex justify-between items-center py-2">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_8px_rgba(34,197,94,0.6)]"></div>
                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">v2 Transparent</span>
            </div>
            <div class="bg-green-500/10 text-green-500 px-3 py-1 rounded-full text-[10px] font-black italic tracking-tighter uppercase">$lauriuche</div>
        </header>

        <main class="flex-grow flex flex-col justify-center">
            
            <div id="view-input" class="text-center transition-all">
                <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.4em] mb-4">Total a Receber</p>
                <div class="text-7xl font-black tracking-tighter flex items-center justify-center gap-3">
                    <span class="text-zinc-800 text-3xl">R$</span>
                    <span id="display-value">0,00</span>
                </div>
            </div>

            <!-- Visualização do QR Code -->
            <div id="view-qr" class="hidden text-center animate-in slide-in-from-bottom-8 duration-500">
                <div id="qr-container" class="mb-8">
                    <img id="qr-image" src="" alt="Pix QR Code" class="w-56 h-56 object-contain">
                </div>
                <div class="bg-zinc-900/80 backdrop-blur-md p-4 rounded-2xl mb-8 inline-block border border-zinc-800">
                    <p id="qr-status" class="text-green-500 text-[10px] font-black uppercase tracking-[0.25em] animate-pulse">Aguardando Pagamento...</p>
                </div>
                <div class="flex flex-col gap-3 px-6">
                    <button onclick="triggerSuccess()" class="bg-zinc-900 text-zinc-400 text-[10px] font-bold uppercase tracking-widest py-3 rounded-xl border border-zinc-800 hover:border-green-500 transition-all">Simular Confirmação</button>
                    <button onclick="resetTerminal()" class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest hover:text-red-500 transition-all">Cancelar [ESC]</button>
                </div>
            </div>

            <!-- Loading -->
            <div id="view-loading" class="hidden text-center">
                <div class="loader mx-auto mb-6"></div>
                <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-widest animate-pulse">Solicitando à AbacatePay...</p>
            </div>

        </main>

        <!-- Teclado -->
        <div id="view-keypad" class="grid grid-cols-3 gap-3 max-w-[320px] mx-auto w-full pb-6">
            <button onclick="pressKey('1')" class="keypad-btn">1</button>
            <button onclick="pressKey('2')" class="keypad-btn">2</button>
            <button onclick="pressKey('3')" class="keypad-btn">3</button>
            <button onclick="pressKey('4')" class="keypad-btn">4</button>
            <button onclick="pressKey('5')" class="keypad-btn">5</button>
            <button onclick="pressKey('6')" class="keypad-btn">6</button>
            <button onclick="pressKey('7')" class="keypad-btn">7</button>
            <button onclick="pressKey('8')" class="keypad-btn">8</button>
            <button onclick="pressKey('9')" class="keypad-btn">9</button>
            <button onclick="pressKey('back')" class="keypad-btn text-zinc-600">
                <i data-lucide="delete"></i>
            </button>
            <button onclick="pressKey('0')" class="keypad-btn">0</button>
            <button onclick="pressKey('enter')" class="keypad-btn btn-pay shadow-lg shadow-green-900/20">
                <i data-lucide="arrow-right" stroke-width="4"></i>
            </button>
        </div>

        <footer class="text-center py-2">
            <p class="text-[8px] text-zinc-800 font-bold uppercase tracking-[0.5em]">Terminal de Pagamento Instantâneo</p>
        </footer>
    </div>

    <script>
        lucide.createIcons();

        // --- CONFIGURAÇÃO ---
        const API_KEY = "abc_dev_2WdLWd1fs1fTWMAetZdgHmXN";
        
        // Dados do cliente preenchidos conforme solicitado
        const FIXED_CUSTOMER = {
            name: "Daniel Lima",
            email: "daniel_lima@abacatepay.com",
            taxId: "123.456.789-01",
            cellphone: "(11) 4002-8922"
        };

        let currentInput = "";
        let isLocked = false;

        function pressKey(key) {
            if (isLocked) return;
            hideToast();

            if (key === 'back') {
                currentInput = currentInput.slice(0, -1);
            } else if (key === 'enter') {
                if (currentInput !== "" && currentInput !== "0") callAbacateAPI();
            } else {
                if (currentInput.length < 9) currentInput += key;
            }
            renderDisplay();
        }

        window.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') pressKey(e.key);
            if (e.key === 'Backspace') pressKey('back');
            if (e.key === 'Enter') pressKey('enter');
            if (e.key === 'Escape') resetTerminal();
        });

        function renderDisplay() {
            const display = document.getElementById('display-value');
            if (currentInput === "") {
                display.innerText = "0,00";
                display.classList.add('text-zinc-900');
            } else {
                const val = (parseInt(currentInput) / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                display.innerText = val;
                display.classList.remove('text-zinc-900');
            }
        }

        async function callAbacateAPI() {
            if (isLocked) return;
            isLocked = true;
            
            const amountCents = parseInt(currentInput);
            
            document.getElementById('view-input').classList.add('hidden');
            document.getElementById('view-keypad').classList.add('hidden');
            document.getElementById('view-loading').classList.remove('hidden');

            try {
                // Endpoint rigoroso conforme o comando CURL v2 fornecido
                const endpoint = "https://api.abacatepay.com/v2/transparents/create";
                const proxy = "https://api.allorigins.win/raw?url=";

                console.log("Chamando v2 Transparent conforme estrutura CURL...");

                const payload = {
                    method: "PIX",
                    data: {
                        amount: amountCents, // Valor digitado no terminal
                        expiresIn: 180,     // Expira em 1 hora
                        description: "Venda Terminal $lauriuche",
                        externalId: "v_" + Date.now(),
                        customer: FIXED_CUSTOMER, // Dados fixos do cliente incluídos aqui
                        metadata: {
                            terminal_v: "2.9.1"
                        }
                    }
                };

                const response = await fetch(proxy + encodeURIComponent(endpoint), {
                    method: "POST",
                    headers: {
                        "Accept": "application/json",
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`Erro API: ${response.status}`);
                }

                const result = await response.json();

                if (result.success && result.data && result.data.brCodeBase64) {
                    renderQRView(result.data.brCodeBase64, false);
                } else {
                    throw new Error("Resposta da API sem imagem QR");
                }

            } catch (err) {
                console.error("Erro na Ligação:", err);
                showToast("Erro de Ligação (CORS/Token). Ativando Simulação.");
                
                setTimeout(() => {
                    renderQRView("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=", true);
                }, 1000);
            }
        }

        function renderQRView(imgData, isSimulated) {
            document.getElementById('view-loading').classList.add('hidden');
            document.getElementById('view-qr').classList.remove('hidden');
            document.getElementById('qr-image').src = imgData;
            
            const statusLabel = document.getElementById('qr-status');
            if (isSimulated) {
                statusLabel.innerText = "MODO SIMULAÇÃO ATIVO";
                statusLabel.classList.replace('text-green-500', 'text-yellow-500');
            } else {
                statusLabel.innerText = "PIX PRONTO PARA PAGAR";
                statusLabel.classList.replace('text-yellow-500', 'text-green-500');
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast-error');
            toast.innerText = msg;
            toast.style.display = 'block';
        }

        function hideToast() {
            document.getElementById('toast-error').style.display = 'none';
        }

        function triggerSuccess() {
            document.getElementById('success-screen').style.display = 'flex';
            
            try {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const osc = context.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, context.currentTime);
                osc.connect(context.destination);
                osc.start();
                osc.stop(context.currentTime + 0.2);
            } catch(e) {}

            setTimeout(() => resetTerminal(), 4000);
        }

        function resetTerminal() {
            isLocked = false;
            currentInput = "";
            renderDisplay();
            hideToast();
            
            document.getElementById('view-input').classList.remove('hidden');
            document.getElementById('view-keypad').classList.remove('hidden');
            document.getElementById('view-qr').classList.add('hidden');
            document.getElementById('view-loading').classList.add('hidden');
            document.getElementById('success-screen').style.display = 'none';
        }
    </script>
</body>
</html>
