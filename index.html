<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS PIX</title>

<link rel="manifest" href="manifest.json">

<style>
body {
    font-family: Arial;
    background: #0d0d0d;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    text-align: center;
}
input {
    font-size: 30px;
    padding: 10px;
    width: 200px;
    text-align: center;
}
button {
    margin-top: 20px;
    padding: 15px;
    font-size: 18px;
    background: #00ff88;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h1>💳 POS PIX</h1>

    <input type="number" id="valor" placeholder="R$">

    <br>
    <button onclick="gerarPix()">Gerar PIX</button>

    <div id="status"></div>
    <canvas id="qrcode"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

async function gerarPix() {
    let valor = document.getElementById("valor").value;

    if(!valor) return alert("Digite um valor");

    document.getElementById("status").innerHTML = "Gerando PIX...";

    const res = await fetch("http://localhost:3000/pix", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ valor })
    });

    const data = await res.json();

    if(!data.qr_code) {
        console.log(data);
        document.getElementById("status").innerHTML = "Erro ao gerar PIX";
        return;
    }

    QRCode.toCanvas(document.getElementById("qrcode"), data.qr_code);

    document.getElementById("status").innerHTML = "Aguardando pagamento...";

    verificar(data.id);
}

async function verificar(id) {

    let tentativas = 0;

    let intervalo = setInterval(async () => {

        tentativas++;

        let res = await fetch(`http://localhost:3000/status/${id}`);
        let data = await res.json();

        if(data.status === "approved") {
            clearInterval(intervalo);
            document.getElementById("status").innerHTML = "✅ Pago!";
        }

        if(tentativas > 60) {
            clearInterval(intervalo);
            document.getElementById("status").innerHTML = "⏳ Expirado";
        }

    }, 5000);
}

</script>
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("PWA ativo"))
    .catch(err => console.log(err));
}
</script>
</body>
</html>
