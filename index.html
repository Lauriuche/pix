<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminal PDV • Mercado Pago</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            background-color: #0a0a0a; 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
        }
        .value-box { background: #1a1a1a; border-radius: 28px; }
    </style>
</head>
<body class="flex items-center justify-center bg-black p-4">

<div class="w-full max-w-[420px] h-full bg-[#111111] flex flex-col rounded-3xl overflow-hidden shadow-2xl">

    <!-- HEADER -->
    <div class="flex items-center justify-between px-6 py-5 border-b border-zinc-800 bg-[#1a1a1a]">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
            <span class="text-sm font-semibold tracking-widest text-emerald-400">TERMINAL ONLINE</span>
        </div>
        <button onclick="openSettings()" class="p-2 text-zinc-400 hover:text-white">
            <i data-lucide="settings" size="26"></i>
        </button>
    </div>

    <!-- TELA INICIAL -->
    <div id="view_main" class="flex-1 flex flex-col items-center justify-center px-6">
        <p class="text-zinc-400 text-sm tracking-widest mb-4">VALOR A PAGAR</p>
        <div class="value-box px-12 py-8 w-full text-center">
            <span id="displayValue" class="text-8xl font-extrabold text-white">0,00</span>
        </div>
        <p class="text-zinc-500 text-xs mt-12">Digite o valor e aperte ENTER</p>
    </div>

    <!-- TELA PIX -->
    <div id="view_pix" class="hidden flex-1 flex-col items-center justify-center px-6">
        <p class="text-emerald-400 text-sm tracking-widest mb-3">ESCANEIE PARA PAGAR</p>
        <div class="bg-white p-5 rounded-3xl mb-6">
            <div id="pixQR" class="w-72 h-72 mx-auto"></div>
        </div>
        <div class="text-center mb-8">
            <span class="text-6xl font-bold" id="pixAmount">0,00</span>
        </div>
        <div class="flex items-center justify-center gap-2 text-emerald-400 mb-6">
            <div class="w-4 h-4 border-2 border-emerald-400 border-t-transparent rounded-full animate-spin"></div>
            <span>Aguardando pagamento...</span>
        </div>
    </div>

    <!-- TELA WI-FI -->
    <div id="view_wifi" class="hidden flex-1 flex-col items-center justify-center px-6 text-center">
        <h1 class="text-5xl font-bold mb-6">WI-FI</h1>
        <div class="bg-white p-5 rounded-3xl mb-8">
            <div id="wifiQR" class="w-72 h-72 mx-auto"></div>
        </div>
        <div class="text-left w-full max-w-[280px]">
            <p class="text-emerald-400">Rede: <span id="wifiSSID" class="text-white font-bold">Mob</span></p>
            <p class="text-emerald-400">Senha: <span id="wifiPass" class="text-yellow-400 font-bold">pptpPass2025</span></p>
        </div>
        <p class="text-zinc-500 text-xs mt-16">Aperte qualquer tecla para voltar</p>
    </div>

    <!-- TELA DE CONFIGURAÇÕES -->
    <div id="view_settings" class="hidden flex-1 flex-col p-6 overflow-auto">
        <h2 class="text-2xl font-bold mb-6">Configurações</h2>
        
        <div class="space-y-6">
            <div>
                <label class="block text-sm text-zinc-400 mb-2">Token Mercado Pago</label>
                <input id="input_token" type="text" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3 text-sm font-mono">
            </div>
            <div>
                <label class="block text-sm text-zinc-400 mb-2">Expiração PIX (minutos)</label>
                <input id="input_expire" type="number" value="5" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3">
            </div>
        </div>

        <div class="mt-auto pt-8">
            <button onclick="saveSettings()" class="w-full bg-emerald-600 py-4 rounded-2xl font-semibold mb-3">Salvar Configurações</button>
            <button onclick="closeSettings()" class="w-full bg-zinc-700 py-4 rounded-2xl font-semibold">Cancelar</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

<script>
    // Firebase
    firebase.initializeApp({
        apiKey: "AIzaSyD3E7c_4jbnLJCGCapM5L8rta6AXVHvZgs",
        authDomain: "indisponivel-rrehfe.firebaseapp.com",
        databaseURL: "https://indisponivel-rrehfe.firebaseio.com",
        projectId: "indisponivel-rrehfe",
        storageBucket: "indisponivel-rrehfe.firebasestorage.app",
        messagingSenderId: "880210924564",
        appId: "1:880210924564:web:fd565cdb0e4f04cd7ac301"
    });

    const db = firebase.database();
    const configRef = db.ref('pdvConfig');

    let CONFIG = {};

    configRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) CONFIG = data;
    });

    let digits = "";

    function updateDisplay() {
        document.getElementById('displayValue').textContent = 
            digits ? (parseInt(digits) / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 }) : "0,00";
    }

    function openSettings() {
        hideAll();
        document.getElementById('view_settings').classList.remove('hidden');
        document.getElementById('input_token').value = CONFIG.mpToken || "";
        document.getElementById('input_expire').value = CONFIG.expireMinutes || 5;
    }

    function saveSettings() {
        const newConfig = {
            mpToken: document.getElementById('input_token').value.trim(),
            expireMinutes: parseInt(document.getElementById('input_expire').value) || 5
        };
        configRef.set(newConfig);
        showToast("Salvo no Firebase!");
        closeSettings();
    }

    function showToast(msg) {
        const t = document.createElement('div');
        t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#10b981;color:white;padding:12px 24px;border-radius:9999px;z-index:9999;';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
    }

    function closeSettings() {
        document.getElementById('view_settings').classList.add('hidden');
        document.getElementById('view_main').classList.remove('hidden');
    }

    function hideAll() {
        document.getElementById('view_main').classList.add('hidden');
        document.getElementById('view_pix').classList.add('hidden');
        document.getElementById('view_wifi').classList.add('hidden');
        document.getElementById('view_settings').classList.add('hidden');
    }

    function startPayment() {
        if (!digits) return;
        const cents = parseInt(digits) % 100;

        if (cents === 1) showWifiScreen();
        else showPixScreen();
    }

    function showPixScreen() {
        hideAll();
        document.getElementById('view_pix').classList.remove('hidden');
        document.getElementById('pixAmount').textContent = (parseInt(digits)/100).toLocaleString('pt-BR', {minimumFractionDigits:2});

        const qr = document.getElementById('pixQR');
        qr.innerHTML = "";
        new QRCode(qr, {
            text: "PIX-" + Date.now(),
            width: 280,
            height: 280
        });
    }

    function showWifiScreen() {
        hideAll();
        document.getElementById('view_wifi').classList.remove('hidden');

        const qr = document.getElementById('wifiQR');
        qr.innerHTML = "";
        new QRCode(qr, {
            text: "WIFI:S:Mob;T:WPA;P:pptpPass2025;;",
            width: 280,
            height: 280
        });
    }

    // Teclado
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') startPayment();
        else if (e.key === 'Escape') {
            hideAll();
            document.getElementById('view_main').classList.remove('hidden');
        }
        else if (e.key === 'Backspace') {
            digits = digits.slice(0, -1);
            updateDisplay();
        }
        else if (e.key >= '0' && e.key <= '9' && digits.length < 8) {
            digits += e.key;
            updateDisplay();
        }
    });

    // Inicialização
    lucide.createIcons();
    updateDisplay();
    console.log('%c✅ Terminal PDV carregado - Engrenagem funcionando!', 'color:#00ff88');
</script>
</body>
</html>
