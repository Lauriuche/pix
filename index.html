<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Checkout Pix - $lauriuche</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root { 
            --bg: #0a0a0a; 
            --card: #141414; 
            --mp-blue: #009ee3; 
            --success: #00a650;
            --accent: #1e1e1e;
        }

        body { 
            background-color: var(--bg); 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            touch-action: manipulation;
        }

        .terminal-container { 
            background: var(--card); 
            border: 1px solid #222; 
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7); 
        }

        .key-btn { 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            transition: all 0.1s ease; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent; 
        }

        .key-btn:active { 
            background: var(--mp-blue); 
            color: white; 
            transform: scale(0.94); 
        }

        #qrcode { 
            background: #fff; 
            padding: 16px; 
            border-radius: 24px; 
            display: inline-block;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        #qrcode img { margin: 0 auto; }

        .success-overlay { 
            position: fixed; 
            inset: 0; 
            background: var(--success); 
            z-index: 100; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .money-display { font-variant-numeric: tabular-nums; letter-spacing: -1px; }

        .copy-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            display: none;
            z-index: 200;
        }
    </style>
</head>
<body>

    <!-- Toast de Cópia -->
    <div id="copyToast" class="copy-toast">Código copiado com sucesso!</div>

    <!-- Overlay de Sucesso -->
    <div id="successScreen" class="success-overlay">
        <div class="bg-white text-emerald-600 rounded-full p-8 shadow-2xl mb-6 animate-bounce">
            <i data-lucide="check" size="80" stroke-width="4"></i>
        </div>
        <h1 class="text-5xl font-extrabold italic tracking-tighter text-white uppercase">Pago!</h1>
        <p class="text-emerald-100 mt-4 text-xl font-semibold opacity-90">Obrigado pela preferência</p>
    </div>

    <!-- Interface do Terminal -->
    <div id="terminal" class="terminal-container w-full h-full sm:h-auto sm:max-w-[420px] sm:rounded-[3rem] p-8 flex flex-col justify-between relative overflow-hidden">
        
        <!-- Header -->
        <header class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div id="statusDot" class="w-2.5 h-2.5 bg-blue-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] font-bold tracking-[0.2em] text-zinc-500 uppercase">Gateway Mercado Pago</span>
            </div>
            <div class="bg-zinc-900 px-4 py-1.5 rounded-full border border-zinc-800">
                <span class="text-[10px] font-black text-blue-400 tracking-wider">MODO POS</span>
            </div>
        </header>

        <!-- Display do Valor -->
        <div class="flex-grow flex flex-col justify-center items-center py-6">
            <p id="labelInput" class="text-zinc-500 text-xs font-bold uppercase tracking-[0.3em] mb-2">Total a Receber</p>
            <div class="money-display text-7xl font-extrabold flex items-baseline gap-2">
                <span class="text-zinc-800 text-3xl font-bold">R$</span>
                <span id="display">0,00</span>
            </div>
        </div>

        <!-- Área Dinâmica -->
        <div id="dynamicArea" class="min-h-[420px] flex flex-col justify-center">
            
            <!-- View 1: Teclado Numérico -->
            <div id="view_keypad" class="grid grid-cols-3 gap-3">
                <button type="button" onclick="typeNum('1')" class="key-btn h-16 rounded-2xl text-2xl font-bold">1</button>
                <button type="button" onclick="typeNum('2')" class="key-btn h-16 rounded-2xl text-2xl font-bold">2</button>
                <button type="button" onclick="typeNum('3')" class="key-btn h-16 rounded-2xl text-2xl font-bold">3</button>
                <button type="button" onclick="typeNum('4')" class="key-btn h-16 rounded-2xl text-2xl font-bold">4</button>
                <button type="button" onclick="typeNum('5')" class="key-btn h-16 rounded-2xl text-2xl font-bold">5</button>
                <button type="button" onclick="typeNum('6')" class="key-btn h-16 rounded-2xl text-2xl font-bold">6</button>
                <button type="button" onclick="typeNum('7')" class="key-btn h-16 rounded-2xl text-2xl font-bold">7</button>
                <button type="button" onclick="typeNum('8')" class="key-btn h-16 rounded-2xl text-2xl font-bold">8</button>
                <button type="button" onclick="typeNum('9')" class="key-btn h-16 rounded-2xl text-2xl font-bold">9</button>
                <button type="button" onclick="typeNum('backspace')" class="key-btn h-16 rounded-2xl flex items-center justify-center text-zinc-500">
                    <i data-lucide="delete"></i>
                </button>
                <button type="button" onclick="typeNum('0')" class="key-btn h-16 rounded-2xl text-2xl font-bold">0</button>
                <button type="button" onclick="createPayment()" class="key-btn h-16 rounded-2xl bg-blue-600 border-none flex items-center justify-center text-white shadow-[0_0_20px_rgba(37,99,235,0.3)]">
                    <i data-lucide="chevron-right" stroke-width="3"></i>
                </button>
            </div>

            <!-- View 2: Checkout Intuitivo (Estilo Vídeo) -->
            <div id="view_qr" class="hidden flex flex-col items-center animate-in fade-in zoom-in duration-500">
                <div id="qrcode" class="mb-6"></div>
                
                <!-- Cronômetro -->
                <div class="flex items-center gap-2 mb-6 bg-zinc-900 px-5 py-2 rounded-2xl border border-zinc-800">
                    <i data-lucide="clock" class="text-blue-500 w-4 h-4"></i>
                    <span id="timer" class="text-white font-mono font-bold">10:00</span>
                </div>

                <!-- Copia e Cola -->
                <button onclick="copyPixCode()" class="w-full flex items-center justify-center gap-3 bg-zinc-800 hover:bg-zinc-700 active:scale-95 py-4 rounded-2xl border border-zinc-700 transition-all mb-4">
                    <i data-lucide="copy" class="text-zinc-400 w-5 h-5"></i>
                    <span class="text-xs font-bold uppercase tracking-widest">Copiar Código Pix</span>
                </button>

                <button onclick="resetTerminal()" class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest hover:text-rose-500 transition-colors">
                    Cancelar Venda [ESC]
                </button>
            </div>

            <!-- View 3: Loading -->
            <div id="view_loading" class="hidden text-center py-20">
                <div class="animate-spin inline-block w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full mb-4"></div>
                <p class="text-blue-400 font-bold uppercase text-[10px] tracking-widest animate-pulse">Solicitando Pagamento...</p>
            </div>
        </div>

        <footer class="text-center pt-4">
            <p class="text-[9px] text-zinc-700 uppercase font-black tracking-[0.4em]">Pagamento via Pix Dinâmico</p>
        </footer>
    </div>

    <script>
        lucide.createIcons();

        // CREDENCIAIS MERCADO PAGO
        const MP_ACCESS_TOKEN = "APP_USR-2084179504074922-042411-9d6918d42c7263e1baf8ad0c3f44052e-1631579027";
        
        let rawValue = ""; 
        let isProcessing = false;
        let paymentId = null;
        let pollingInterval = null;
        let timerInterval = null;
        let pixCode = "";

        // Teclado
        function typeNum(num) {
            if (isProcessing) return;
            if (num === 'backspace') { rawValue = rawValue.slice(0, -1); }
            else { if (rawValue.length < 9) rawValue += num; }
            vibrate(10);
            updateDisplay();
        }

        function updateDisplay() {
            const display = document.getElementById('display');
            if (!rawValue || rawValue === "0") {
                display.innerText = "0,00";
                display.classList.add('text-zinc-800');
            } else {
                const val = (parseInt(rawValue) / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                display.innerText = val;
                display.classList.remove('text-zinc-800');
            }
        }

        // Criar Pagamento
        async function createPayment() {
            if (!rawValue || parseInt(rawValue) === 0 || isProcessing) return;
            
            showView('loading');
            isProcessing = true;

            const amount = parseFloat(parseInt(rawValue) / 100);
            
            const payload = {
                transaction_amount: amount,
                description: "Venda Terminal PDV",
                payment_method_id: "pix",
                payer: { email: "pagamento@lauriuche.com" }
            };

            try {
                const response = await fetch("https://api.mercadopago.com/v1/payments", {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${MP_ACCESS_TOKEN}`,
                        'Content-Type': 'application/json',
                        'X-Idempotency-Key': Date.now().toString()
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                if (data.status === 'pending' || data.status === 'in_process') {
                    paymentId = data.id;
                    pixCode = data.point_of_interaction.transaction_data.qr_code;
                    renderQR(pixCode);
                    startPolling(paymentId);
                    startTimer(600); // 10 minutos
                } else {
                    throw new Error(data.message || "Erro ao processar");
                }
            } catch (err) {
                alert("Erro: " + err.message);
                resetTerminal();
            }
        }

        function renderQR(text) {
            const qrBox = document.getElementById("qrcode");
            qrBox.innerHTML = "";
            new QRCode(qrBox, {
                text: text,
                width: 240,
                height: 240,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
            showView('qr');
            document.getElementById('labelInput').innerText = "Pagamento Pendente";
        }

        // Cronômetro (Igual ao vídeo)
        function startTimer(seconds) {
            let timer = seconds;
            const display = document.getElementById('timer');
            
            timerInterval = setInterval(() => {
                let minutes = Math.floor(timer / 60);
                let secs = timer % 60;
                display.innerText = `${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                if (--timer < 0) {
                    clearInterval(timerInterval);
                    alert("Tempo expirado. Gere uma nova venda.");
                    resetTerminal();
                }
            }, 1000);
        }

        // Copiar Código (Função pedida no vídeo)
        function copyPixCode() {
            const input = document.createElement('textarea');
            input.value = pixCode;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            
            const toast = document.getElementById('copyToast');
            toast.style.display = 'block';
            vibrate(50);
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        // Polling (Verificação a cada 3s)
        function startPolling(id) {
            pollingInterval = setInterval(async () => {
                try {
                    const res = await fetch(`https://api.mercadopago.com/v1/payments/${id}`, {
                        headers: { 'Authorization': `Bearer ${MP_ACCESS_TOKEN}` }
                    });
                    const data = await res.json();
                    
                    if (data.status === 'approved') {
                        stopAll();
                        showSuccess();
                    }
                } catch (e) { console.error("Erro no polling", e); }
            }, 3000);
        }

        function stopAll() {
            if (pollingInterval) clearInterval(pollingInterval);
            if (timerInterval) clearInterval(timerInterval);
        }

        function showView(view) {
            ['keypad', 'qr', 'loading'].forEach(v => document.getElementById(`view_${v}`).classList.add('hidden'));
            document.getElementById(`view_${view}`).classList.remove('hidden');
        }

        function showSuccess() {
            document.getElementById('successScreen').style.display = 'flex';
            playBeep();
            vibrate([100, 50, 100]);
            setTimeout(() => resetTerminal(), 5000);
        }

        function resetTerminal() {
            stopAll();
            location.reload();
        }

        function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(880, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.5);
            } catch(e) {}
        }

        // Bluetooth Keys
        window.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') typeNum(e.key);
            if (e.key === 'Backspace') typeNum('backspace');
            if (e.key === 'Enter') createPayment();
            if (e.key === 'Escape') resetTerminal();
        });
    </script>
</body>
</html>
